<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark gradient background -->
  <defs>
    <radialGradient id="bgGradient6" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#6b4423;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f08;stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgGradient6)"/>

  <!-- Truck silhouette with engine detail -->
  <g transform="translate(300, 200)">
    <!-- Cabin -->
    <path d="M -65 -5 L -50 -40 L -10 -45 L -5 -5 Z" fill="none" stroke="white" stroke-width="2.5"/>

    <!-- Cargo bed -->
    <path d="M -5 -5 L 0 -20 L 60 -15 L 65 5 Z" fill="none" stroke="white" stroke-width="2.5"/>

    <!-- Bumper/grill -->
    <rect x="-70" y="-10" width="10" height="30" fill="white" opacity="0.7"/>
    <rect x="-68" y="-8" width="4" height="8" fill="none" stroke="white" stroke-width="1"/>
    <rect x="-62" y="-8" width="4" height="8" fill="none" stroke="white" stroke-width="1"/>
    <rect x="-68" y="2" width="4" height="8" fill="none" stroke="white" stroke-width="1"/>
    <rect x="-62" y="2" width="4" height="8" fill="none" stroke="white" stroke-width="1"/>

    <!-- Left wheel -->
    <circle cx="-35" cy="20" r="22" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="-35" cy="20" r="10" fill="white"/>

    <!-- Right wheel -->
    <circle cx="45" cy="20" r="22" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="45" cy="20" r="10" fill="white"/>

    <!-- Engine block symbol (under hood) -->
    <rect x="-55" y="-35" width="20" height="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-50" y1="-30" x2="-40" y2="-30" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="-50" y1="-22" x2="-40" y2="-22" stroke="white" stroke-width="1" opacity="0.5"/>

    <!-- Side mirrors -->
    <rect x="-70" y="-25" width="5" height="12" fill="white" opacity="0.5"/>
  </g>
</svg>