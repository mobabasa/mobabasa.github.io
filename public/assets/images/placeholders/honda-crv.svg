<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark gradient background -->
  <defs>
    <radialGradient id="bgGradient5" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#a67c52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2817;stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgGradient5)"/>

  <!-- SUV/CRV silhouette -->
  <g transform="translate(300, 200)">
    <!-- Main body -->
    <path d="M -60 0 L -45 -45 L -10 -50 L 10 -50 L 45 -45 L 60 0 Z" fill="none" stroke="white" stroke-width="2.5"/>

    <!-- Windshield -->
    <path d="M -35 -45 L -20 -50 L 20 -50 L 35 -45 Z" fill="white" opacity="0.1" stroke="white" stroke-width="1.5"/>

    <!-- Door line -->
    <line x1="0" y1="-50" x2="0" y2="0" stroke="white" stroke-width="1.5" opacity="0.5"/>

    <!-- Left wheel -->
    <circle cx="-40" cy="15" r="20" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="-40" cy="15" r="10" fill="white"/>

    <!-- Right wheel -->
    <circle cx="40" cy="15" r="20" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="40" cy="15" r="10" fill="white"/>

    <!-- Window lines -->
    <line x1="-35" y1="-45" x2="-25" y2="-35" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="35" y1="-45" x2="25" y2="-35" stroke="white" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>