<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark gradient background -->
  <defs>
    <radialGradient id="bgGradient4" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgGradient4)"/>

  <!-- Server stack icon -->
  <g transform="translate(300, 200)">
    <!-- Top server unit -->
    <rect x="-60" y="-60" width="120" height="35" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <line x1="-60" y1="-45" x2="60" y2="-45" stroke="white" stroke-width="1.5"/>
    <circle cx="-45" cy="-52" r="4" fill="white"/>
    <circle cx="-25" cy="-52" r="4" fill="white"/>
    <circle cx="-5" cy="-52" r="4" fill="white"/>
    <rect x="10" y="-50" width="8" height="3" fill="white"/>

    <!-- Middle server unit -->
    <rect x="-60" y="-15" width="120" height="35" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="white" stroke-width="1.5"/>
    <circle cx="-45" cy="-7" r="4" fill="white"/>
    <circle cx="-25" cy="-7" r="4" fill="white"/>
    <circle cx="-5" cy="-7" r="4" fill="white"/>
    <rect x="10" y="-5" width="8" height="3" fill="white"/>

    <!-- Bottom server unit -->
    <rect x="-60" y="30" width="120" height="35" rx="3" fill="none" stroke="white" stroke-width="2"/>
    <line x1="-60" y1="45" x2="60" y2="45" stroke="white" stroke-width="1.5"/>
    <circle cx="-45" cy="38" r="4" fill="white"/>
    <circle cx="-25" cy="38" r="4" fill="white"/>
    <circle cx="-5" cy="38" r="4" fill="white"/>
    <rect x="10" y="40" width="8" height="3" fill="white"/>

    <!-- Side braces -->
    <line x1="-65" y1="-60" x2="-65" y2="65" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="65" y1="-60" x2="65" y2="65" stroke="white" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>