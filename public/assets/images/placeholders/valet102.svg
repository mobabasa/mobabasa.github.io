<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark gradient background -->
  <defs>
    <radialGradient id="bgGradient2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#4a9566;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f22;stop-opacity:1" />
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bgGradient2)"/>

  <!-- Car icon - simple silhouette -->
  <g transform="translate(300, 200)">
    <!-- Main car body -->
    <path d="M -50 -10 L -30 -40 L 30 -40 L 50 -10 Z" fill="white" stroke="white" stroke-width="2"/>

    <!-- Car top/cabin -->
    <path d="M -25 -40 L -15 -55 L 15 -55 L 25 -40 Z" fill="white" stroke="white" stroke-width="2"/>

    <!-- Front bumper -->
    <rect x="-55" y="-5" width="110" height="8" fill="white"/>

    <!-- Left wheel -->
    <circle cx="-35" cy="20" r="18" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="-35" cy="20" r="8" fill="white"/>

    <!-- Right wheel -->
    <circle cx="35" cy="20" r="18" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="35" cy="20" r="8" fill="white"/>

    <!-- Key icon (top right) -->
    <circle cx="55" cy="-45" r="10" fill="white"/>
    <path d="M 65 -45 L 80 -30" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>